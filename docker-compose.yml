version: '3.8'

services:
  mirrorclone:
    build: .
    container_name: mirrorclone
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./mirrorclone/config:/config
      - ./mirrorclone/backups:/backups
      - /srv/link_appdata:/data:ro
    environment:
#      - GOOGLE_CLIENT_ID=your-client-id
#      - GOOGLE_CLIENT_SECRET=your-client-secret
      - TZ=Asia/Jerusalem
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    privileged: true
    networks:
      - backup-network

networks:
  backup-network:
    driver: bridge

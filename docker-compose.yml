version: '3.8'

services:
  mirrorclone:
    build: .
    container_name: mirrorclone
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./mirrorclone/config:/config
      - ./mirrorclone/backups:/backups
      - /srv/link_appdata:/data

    environment:
      # Google Drive OAuth credentials and notification providers are now
      # configured from the UI (Settings screen). See /config/app_settings.json
      # and /config/notifications.json inside the container volume.
      - TZ=Asia/Jerusalem
    privileged: true
    networks:
      - backup-network

networks:
  backup-network:
    driver: bridge
